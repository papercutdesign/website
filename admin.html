<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papercut Admin Console</title>
    <link rel="icon" href="s-icon-01.png" type="image/png" sizes="32x32">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            sans: ['"Rubik"', 'system-ui', 'sans-serif'],
            heading: ['"Rubik"', 'system-ui', 'sans-serif'],
          }
        }
      }
    </script>

    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden; background: #F8FAFC; pointer-events: none;
        }
        .aurora-blob {
            position: absolute; filter: blur(90px); opacity: 0.5; border-radius: 50%;
            mix-blend-mode: multiply; animation: floatBlob 20s infinite alternate ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #E9D5FF; }
        .blob-2 { top: 40%; right: -10%; width: 60vw; height: 60vw; background: #DBEAFE; animation-delay: -5s;}

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-3%, -2%) scale(0.95); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 28px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #7C3AED, #D946EF); color: white;
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        .btn-premium:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(124, 58, 237, 0.5);
        }
        .btn-premium:disabled { opacity: 0.7; cursor: not-allowed; }

        .form-input {
            width: 100%; padding: 0.875rem 1.25rem; background: rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; transition: all 0.3s;
        }
        .form-input:focus {
            outline: none; border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        
        /* Modern generic file input styling */
        input[type=file]::file-selector-button {
          margin-right: 15px; border: none; background: #F3E8FF; padding: 8px 16px;
          border-radius: 50px; color: #7C3AED; cursor: pointer; transition: background 0.2s;
          font-family: 'Rubik', sans-serif; font-weight: 500; font-size: 14px;
        }
        input[type=file]::file-selector-button:hover { background: #E9D5FF; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
    </div>

    <!-- Go back home link -->
    <a href="index.html" class="absolute top-6 left-6 text-slate-500 hover:text-purple-600 font-medium transition flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Site
    </a>

    <div class="glass-card w-full max-w-md p-10 relative">
        <div class="text-center mb-8">
            <img src="logopng.png" alt="Papercut" class="h-8 mx-auto mb-6">
            <h1 class="text-3xl font-bold font-heading">Content Admin</h1>
            <p class="text-slate-500 mt-2 text-sm">Upload new assets directly to your live portfolio.</p>
        </div>

        <form id="uploadForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Asset Category</label>
                <select id="category" name="category" class="form-input" required>
                    <option value="ad">Ad Design</option>
                    <option value="logo">Logo Design</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Portfolio Slot (1-20)</label>
                <select id="slot" name="slot" class="form-input" required>
                    <!-- Generated via JS -->
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Image File (.jpg)</label>
                <input type="file" id="file" name="file" accept=".jpg,.jpeg" class="form-input" required>
                <p class="text-xs text-slate-400 mt-2">Upload your high-quality JPG. It will be resized by CSS automatically.</p>
            </div>

            <div class="pt-2">
                <label class="block text-sm font-medium text-slate-700 mb-1">Admin Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your secret text" class="form-input" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-premium w-full py-3.5 font-medium mt-6">
                Upload to Website
            </button>

            <div id="statusMessage" class="text-center text-sm font-medium mt-4 hidden p-3 rounded-lg border"></div>
        </form>
    </div>

    <script>
        // Populate slot 1-20 dynamically
        const slotSelect = document.getElementById('slot');
        for (let i = 1; i <= 20; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = `Slot ${i}`;
            slotSelect.appendChild(option);
        }

        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = "Uploading & Committing...";
            
            statusMsg.classList.add('hidden');
            // Reset status classes
            statusMsg.className = "text-center text-sm font-medium mt-4 p-3 rounded-lg border";

            const formData = new FormData(form);

            try {
                // Adjust route if necessary for your build setup
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (response.ok) {
                    statusMsg.textContent = "✅ " + data.message;
                    statusMsg.classList.add('bg-green-50', 'text-green-800', 'border-green-200');
                    form.reset();
                } else {
                    statusMsg.textContent = "❌ Error: " + (data.error || "Unknown error occurred.");
                    if (data.details) console.error("GitHub Details:", data.details);
                    statusMsg.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
                }
            } catch (err) {
                statusMsg.textContent = "❌ Network error. Are you running this via a local server?";
                statusMsg.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
            } finally {
                statusMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = "Upload to Website";
            }
        });
    </script>
</body>
</html>
