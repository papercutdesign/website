<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papercut Admin</title>
    <link rel="icon" href="s-icon-01.png" type="image/png" sizes="32x32">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                fontFamily: {
                    sans: ['"Rubik"', 'system-ui', 'sans-serif'],
                    heading: ['"Rubik"', 'system-ui', 'sans-serif'],
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #F8FAFC;
            color: #0F172A;
        }

        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #F8FAFC;
            pointer-events: none;
        }

        .aurora-blob {
            position: absolute;
            filter: blur(90px);
            opacity: 0.5;
            border-radius: 50%;
            mix-blend-mode: multiply;
            animation: floatBlob 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: #E9D5FF;
        }

        .blob-2 {
            top: 40%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: #DBEAFE;
            animation-delay: -5s;
        }

        @keyframes floatBlob {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(-3%, -2%) scale(0.95);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .btn-premium {
            background: linear-gradient(135deg, #7C3AED, #D946EF);
            color: white;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .btn-premium:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(124, 58, 237, 0.5);
        }

        .btn-premium:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #7C3AED;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        /* Drag and Drop Styling */
        .drop-zone {
            border: 2px dashed #CBD5E1;
            border-radius: 16px;
            padding: 3rem 1rem;
            text-align: center;
            background: rgba(248, 250, 252, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .drop-zone.dragover {
            border-color: #7C3AED;
            background: rgba(124, 58, 237, 0.05);
            transform: scale(1.02);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            w-full: 100%;
            h-full: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            background: white;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s;
            cursor: pointer;
            aspect-ratio: 4/3;
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .gallery-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Interactive actions on card */
        .card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 20;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s;
        }

        .gallery-item:hover .card-actions {
            opacity: 1;
            transform: translateY(0);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            color: #334155;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: white;
            transform: scale(1.1);
            color: #7C3AED;
        }

        .action-btn.delete:hover {
            color: #EF4444;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Fullscreen Modal */
        .preview-modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .preview-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .preview-modal img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .preview-modal.show img {
            transform: scale(1);
        }

        .preview-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: background 0.2s;
        }

        .preview-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="min-h-screen">

    <div class="aurora-bg">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
    </div>

    <!-- Top Navigation -->
    <nav class="sticky top-4 z-40 max-w-6xl mx-auto flex justify-between items-center bg-white/70 backdrop-blur-md rounded-full px-8 py-3 shadow-sm mb-10 hidden"
        id="admin-nav">
        <div class="flex items-center gap-4">
            <img src="logopng.png" alt="Papercut" class="h-6">
            <span class="font-bold text-slate-800 border-l border-slate-300 pl-4">Dashboard</span>
        </div>
        <div class="flex gap-2 p-1 bg-slate-100 rounded-full">
            <button onclick="switchView('gallery')" id="nav-gallery"
                class="px-6 py-2 text-sm font-medium rounded-full bg-white shadow-sm text-purple-700 transition">Gallery</button>
            <button onclick="switchView('upload')" id="nav-upload"
                class="px-6 py-2 text-sm font-medium rounded-full text-slate-600 hover:text-slate-900 transition"><i
                    class="fas fa-plus mr-1"></i> Upload</button>
        </div>
        <div>
            <button onclick="logout()"
                class="text-sm font-medium text-slate-500 hover:text-red-500 transition px-4 py-2 rounded-full hover:bg-red-50"><i
                    class="fas fa-sign-out-alt mr-2"></i> Logout</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 pb-20">

        <!-- Login View -->
        <div id="view-login" class="view-section active max-w-md mx-auto mt-20">
            <div class="glass-card p-10 text-center">
                <img src="logopng.png" alt="Papercut" class="h-8 mx-auto mb-8">
                <h1 class="text-2xl font-bold mb-2">Admin Login</h1>
                <p class="text-slate-500 mb-8 text-sm">Enter your master password</p>
                <form id="loginForm" class="space-y-4">
                    <input type="password" id="loginPassword" placeholder="Admin Password" class="form-input" required>
                    <button type="submit" class="btn-premium w-full py-3.5 mt-2 font-medium">Access Dashboard</button>
                </form>
            </div>
        </div>

        <!-- Upload View -->
        <div id="view-upload" class="view-section max-w-xl mx-auto mt-10">
            <div class="glass-card p-12">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-bold">New Asset</h2>
                    <button onclick="switchView('gallery')" class="text-slate-400 hover:text-slate-600"><i
                            class="fas fa-times text-xl"></i></button>
                </div>

                <form id="uploadForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Category</label>
                        <select id="category" name="category" class="form-input text-lg" required>
                            <option value="ad">Ad Design</option>
                            <option value="logo">Logo Design</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">High Quality Image</label>
                        <div class="drop-zone" id="dropZone">
                            <input type="file" id="file" name="file" accept="image/*" required>
                            <div id="dropText">
                                <i class="fas fa-image text-4xl text-purple-300 mb-3 block"></i>
                                <span class="font-medium text-slate-700 text-lg">Click or drag image here</span>
                                <p class="text-sm text-slate-400 mt-1">Accepts ultra-high res .JPG and .PNG</p>
                            </div>
                            <div id="filePreview" class="hidden">
                                <span
                                    class="bg-purple-100 text-purple-700 px-4 py-2 rounded-full font-medium text-sm flex items-center justify-center gap-2">
                                    <i class="fas fa-check-circle"></i>
                                    <span id="fileName">File selected</span>
                                </span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn"
                        class="btn-premium w-full py-4 text-lg font-medium mt-8 shadow-lg">
                        <i class="fas fa-cloud-upload-alt mr-2"></i> Upload & Publish
                    </button>

                    <div id="statusMessage" class="text-center text-sm font-medium mt-4 hidden p-4 rounded-xl border">
                    </div>
                </form>
            </div>
        </div>

        <!-- Gallery Management View -->
        <div id="view-gallery" class="view-section">
            <div class="glass-card p-10">
                <div
                    class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 border-b border-slate-200 pb-6 gap-6">
                    <div>
                        <h2 class="text-3xl font-bold text-slate-900">Live Gallery</h2>
                        <p class="text-slate-500 mt-1 text-lg">Manage your portfolio. Changes are instant.</p>
                    </div>

                    <div class="flex bg-slate-100/80 p-1.5 rounded-full shadow-inner" id="gallery-filters">
                        <button class="px-6 py-2.5 rounded-full text-sm font-medium bg-white shadow-sm text-purple-700"
                            data-filter="all">All Items</button>
                        <button class="px-6 py-2.5 rounded-full text-sm font-medium text-slate-500 hover:text-slate-800"
                            data-filter="ad">Ads</button>
                        <button class="px-6 py-2.5 rounded-full text-sm font-medium text-slate-500 hover:text-slate-800"
                            data-filter="logo">Logos</button>
                    </div>
                </div>

                <div id="gallery-loading" class="text-center py-20 text-slate-500 hidden">
                    <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-purple-500"></i>
                    <p class="text-lg">Syncing Database...</p>
                </div>

                <div id="gallery-grid" class="gallery-grid">
                    <!-- Items injected via JS -->
                </div>
            </div>
        </div>

    </div>

    <!-- Fullscreen Preview Modal -->
    <div id="previewModal" class="preview-modal">
        <div class="preview-close" onclick="closePreview()"><i class="fas fa-times"></i></div>
        <img id="previewImg" src="" alt="Preview">
    </div>

    <script>
        let adminPassword = sessionStorage.getItem('papercut_admin_pwd') || '';
        let galleryItems = [];

        // Auth
        if (adminPassword) {
            initDashboard();
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            adminPassword = document.getElementById('loginPassword').value;
            sessionStorage.setItem('papercut_admin_pwd', adminPassword);
            initDashboard();
        });

        function logout() {
            sessionStorage.removeItem('papercut_admin_pwd');
            adminPassword = '';
            document.getElementById('admin-nav').classList.add('hidden');
            switchView('login');
        }

        function initDashboard() {
            document.getElementById('admin-nav').classList.remove('hidden');
            document.getElementById('admin-nav').classList.add('flex');
            switchView('gallery');
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Nav styling
            if (viewName !== 'login') {
                const navGallery = document.getElementById('nav-gallery');
                const navUpload = document.getElementById('nav-upload');

                if (viewName === 'gallery') {
                    navGallery.className = "px-6 py-2 text-sm font-medium rounded-full bg-white shadow-sm text-purple-700 transition";
                    navUpload.className = "px-6 py-2 text-sm font-medium rounded-full text-slate-600 hover:text-slate-900 transition";
                    fetchGallery();
                } else {
                    navUpload.className = "px-6 py-2 text-sm font-medium rounded-full bg-white shadow-sm text-purple-700 transition";
                    navGallery.className = "px-6 py-2 text-sm font-medium rounded-full text-slate-600 hover:text-slate-900 transition";
                }
            }
        }

        // --- Drag and Drop Logic ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('file');
        const dropText = document.getElementById('dropText');
        const filePreview = document.getElementById('filePreview');
        const fileNameDisplay = document.getElementById('fileName');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault(); e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            if (files.length) {
                fileInput.files = files;
                updateFileDisplay();
            }
        });

        fileInput.addEventListener('change', updateFileDisplay);

        function updateFileDisplay() {
            if (fileInput.files.length > 0) {
                dropText.classList.add('hidden');
                filePreview.classList.remove('hidden');
                fileNameDisplay.textContent = fileInput.files[0].name;
                dropZone.style.borderColor = "#7C3AED";
            } else {
                dropText.classList.remove('hidden');
                filePreview.classList.add('hidden');
                dropZone.style.borderColor = "#CBD5E1";
            }
        }

        // --- Upload Logic ---
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMessage');

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true; submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Unpacking to CDN...';
            statusMsg.className = "text-center text-sm font-medium mt-4 p-4 rounded-xl border";

            try {
                const formData = new FormData(uploadForm);
                const response = await fetch('/api/portfolio', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${adminPassword}` },
                    body: formData
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    statusMsg.innerHTML = '<i class="fas fa-check-circle mr-1"></i> ' + data.message;
                    statusMsg.classList.add('bg-green-50', 'text-green-800', 'border-green-200');
                    uploadForm.reset();
                    updateFileDisplay();

                    // Auto-switch back to gallery after a moment
                    setTimeout(() => switchView('gallery'), 1500);
                } else {
                    throw new Error(data.error || "Unknown error");
                }
            } catch (err) {
                statusMsg.innerHTML = '<i class="fas fa-exclamation-circle mr-1"></i> ' + (err.message || "Network error");
                statusMsg.classList.add('bg-red-50', 'text-red-800', 'border-red-200');
                if (err.message.includes("Unauthorized")) setTimeout(logout, 2000);
            } finally {
                statusMsg.classList.remove('hidden');
                submitBtn.disabled = false; submitBtn.innerHTML = '<i class="fas fa-cloud-upload-alt mr-2"></i> Upload & Publish';
            }
        });

        // --- Gallery Management ---
        async function fetchGallery() {
            document.getElementById('gallery-loading').classList.remove('hidden');
            document.getElementById('gallery-grid').innerHTML = '';
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();
                if (response.ok && data.success) {
                    galleryItems = data.items;
                    // Persist active filter
                    const activeFilterBtn = document.querySelector('#gallery-filters .bg-white');
                    const currentFilter = activeFilterBtn ? activeFilterBtn.getAttribute('data-filter') : 'all';
                    renderGallery(currentFilter);
                } else {
                    alert("Error loading gallery: " + data.error);
                }
            } catch (err) {
                console.error("Failed to fetch gallery:", err);
            } finally {
                document.getElementById('gallery-loading').classList.add('hidden');
            }
        }

        function renderGallery(filterTheme) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';

            const filteredItems = filterTheme === 'all'
                ? galleryItems
                : galleryItems.filter(item => item.category === filterTheme);

            if (filteredItems.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 px-6 border-2 border-dashed border-slate-200 rounded-3xl"><i class="fas fa-images text-4xl text-slate-300 mb-3 block"></i><p class="text-slate-500 font-medium text-lg">No images found.</p><p class="text-slate-400 text-sm mt-1">Upload an image to see it live.</p></div>';
                return;
            }

            filteredItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn" title="View Fullsize" onclick="openPreview(event, '/assets/${item.r2_key}')"><i class="fas fa-expand-arrows-alt"></i></button>
                        <button class="action-btn delete" title="Delete Image" onclick="deleteItem(event, '${item.id}')"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <img src="/assets/${item.r2_key}" alt="Portfolio File" loading="lazy" onclick="openPreview(event, '/assets/${item.r2_key}')">
                    <div class="absolute bottom-4 left-4 right-4 flex justify-between items-end z-10">
                        <span class="text-[10px] font-bold uppercase tracking-widest text-white bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full shadow-lg">
                            ${item.category}
                        </span>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        async function deleteItem(e, id) {
            e.stopPropagation(); // prevent opening preview
            if (!confirm('Permanently delete this image from your live website?')) return;

            try {
                const response = await fetch(`/api/portfolio/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${adminPassword}` }
                });

                const data = await response.json();
                if (response.ok && data.success) {
                    fetchGallery(); // Refresh silently
                } else {
                    alert('Error: ' + data.error);
                    if (data.error.includes("Unauthorized")) logout();
                }
            } catch (err) {
                alert('Network error deleting item.');
            }
        }

        // Filters UI
        document.querySelectorAll('#gallery-filters button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#gallery-filters button').forEach(b => {
                    b.className = "px-6 py-2.5 rounded-full text-sm font-medium text-slate-500 hover:text-slate-800 transition";
                });
                e.target.className = "px-6 py-2.5 rounded-full text-sm font-medium bg-white shadow-sm text-purple-700 transition";
                renderGallery(e.target.getAttribute('data-filter'));
            });
        });

        // --- Preview Modal Logic ---
        const previewModal = document.getElementById('previewModal');
        const previewImg = document.getElementById('previewImg');

        function openPreview(e, src) {
            e.stopPropagation();
            previewImg.src = src;
            previewModal.classList.add('show');
        }

        function closePreview() {
            previewModal.classList.remove('show');
            setTimeout(() => { previewImg.src = ''; }, 300); // clear after animation
        }

        previewModal.addEventListener('click', (e) => {
            if (e.target === previewModal) closePreview();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && previewModal.classList.contains('show')) {
                closePreview();
            }
        });

    </script>
</body>

</html>
